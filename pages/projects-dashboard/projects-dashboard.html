<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFP Application</title>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    integrity="sha512-..."
    crossorigin="anonymous"
    referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="../../styles/layout/grid.css">
    <link rel="stylesheet" href="../../styles/layout/header.css">
    <link rel="stylesheet" href="../../styles/pipeline.css">
    <link rel="stylesheet" href="../../styles/components/card.css">
    <link rel="stylesheet" href="../../styles/layout/sidebar.css">
    <link rel="stylesheet" href="../../styles/main.css">



</head>
<body>
    <!-- application starts here  -->
    <div class="app">
        <!-- sidebar content goes here  -->
        <aside class="app-aside">
            <div class="aside-header">
                <div class="aside-logo">
                    <img src="" alt="" class="aside-logo-img">
                    <p class="aside-logo-text"></p>
                </div>
                <div class="aside-navigation">
                    <ul>
                        

                        <li class="aside-nav-item"  data-status="login"  id="login">
                            <span><i class="fa-solid fa-arrow-right-to-bracket"></i></span> 
                            <p>Login</p>
                        </li>
                        
                        <li class="aside-nav-item"  data-status="pipeline"  id="pipeline">
                            <span><i class="fa-regular fa-clipboard"></i></span> 
                            <p>RFP Pipeline</p>
                        </li>

                         <li class="aside-nav-item"  data-status="vendors"  id="vendors">
                            <span><i class="fa-regular fa-building"></i></span> 
                            <p>Vendors</p>
                        </li>

                         <li class="aside-nav-item"  data-status="reports"  id="reports">
                            <span><i class="fa-solid fa-chart-line"></i></span> 
                            <p>Reports</p>
                        </li>

                         <li class="aside-nav-item"  data-status="calender"  id="calender">
                            <span><i class="fa-solid fa-calendar-days"></i></span> 
                            <p>Calender</p>
                        </li>
                        
                         <li class="aside-nav-item"  data-status="document"  id="document">
                            <span><i class="fa-regular fa-file"></i></span> 
                            <p>Document</p>
                        </li>
                       
                    </ul>
                </div>
            </div>
            <div class="aside-footer">
                <button id="logout">
                    <span><i class="fa-solid fa-right-from-bracket"></i></span>
                    Logout
                </button>
            </div>
        </aside>
        <!-- main content goes here  -->
        <main class="app-main">
            <!-- header start here x -->
             <header class="app-header">
                <div class="left">
                    <h2>RFP Pipeline</h2>
                </div>
                <div class="right">
                    <div class="search-box">
                        <input type="text" placeholder="search..." class="input-search">
                    </div>
                    <div class="newRFP">
                        <button class="new-rfp-btn">New RFP</button>
                    </div>
                    <div class="avatar">
                        <img src="../../assets/avatar.png" alt="admin" class="avatar-img">
                    </div>
                </div>
             </header>
             <div class="app-pipeline-container">
                <div class="pipeline-tabs" id="pipeline-tabs">
                    <button class="tab-item active draft"  data-status="draft">
                        <span class="tab-item-heading">Draft</span>
                        <span class="tab-item-number"></span>
                    </button>
                    <button class="tab-item review" data-status="review">
                        <span class="tab-item-heading">Review</span>
                        <span class="tab-item-number"></span>
                    </button>
                    <button class="tab-item approved" data-status="approved">
                       <span class="tab-item-heading">Approved</span>
                        <span class="tab-item-number"></span>
                    </button>
                    <button class="tab-item submitted" data-status="submitted">
                      <span class="tab-item-heading">Submitted</span>
                        <span class="tab-item-number"></span> 
                    </button>
                </div>
                <div class="projects-container">
                    <div class="projects-grid">

                    </div>
                </div>
             </div>

             <!-- modal adding new rfp  -->

             <div class="add-new-rfp-modal">
                <form id="addNewRfpForm">
                    <header>
                        <h2>Add New RFP</h2>
                        <button type="button" class="close-add-new-rfp-modal">x</button>
                    </header>
                    <div>
                        <label for="RFPName">RFP Name:</label>
                        <input type="text" name="RFPName" id="RFPName" required placeholder="enter RFP name">
                    </div>
                    <div>
                        <label for="RFPSubDate">Submission Date:</label>
                        <input type="date" name="RFPSubDate" id="RFPSubDate" required placeholder="enter RFP Submission Date">
                    </div>
                    <div>
                        <label for="RFPNumber">RFP Number:</label>
                        <input type="text" name="RFPNumber" id="RFPNumber" required placeholder="enter RFP Number">
                    </div>
                    <button type="submit" id="newRfpAddBtnid" class="newRfpAddBtn">Add RFP</button>
                </form>
             </div>
        </main>

    </div>
    <script  type="module" src="../../js/main.js"></script>
    <script defer src="../../js/components/sidebar.js"></script>
</body>
</html>
